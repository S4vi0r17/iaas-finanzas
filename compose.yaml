# Para Dokploy: apunta a este compose (o al Dockerfile de la raíz).
# La base MySQL vive aparte (créala con el "database creator" de Dokploy) y
# se referencia acá vía DATABASE_URL: así el redeploy del API nunca la toca.
#
# Dokploy escribe las variables que definís en su UI (Environment) a un .env
# junto a este compose, pero NO las inyecta solas al contenedor: hace falta
# `env_file` (o `${VAR}` en `environment`, que en algunas versiones de Dokploy
# falla por dónde deja ese .env). Definí ahí DATABASE_URL y JWT_SECRET.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
