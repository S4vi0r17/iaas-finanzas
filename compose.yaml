# Solo para desarrollo local: `docker compose up` levanta el backend + MySQL
# juntos, sin depender de nada externo. En producción se usa Dokploy con una
# Application (Dockerfile) directa sobre la raíz del repo; este archivo no
# interviene ahí.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: mysql://root:root@db:3306/iaas
      JWT_SECRET: dev-insecure-secret-change-me
      ENABLE_DEV_SEED: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: iaas
    ports:
      - "3306:3306"
    volumes:
      - iaas_dev_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  iaas_dev_mysql:
