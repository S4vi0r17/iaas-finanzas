# Para Dokploy: apunta a este compose (o al Dockerfile de la raíz).
# El volumen `iaas_data` conserva el SQLite entre redeploys.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_PATH: /app/data/iaas.sqlite
      # ¡Cámbialo en Dokploy! openssl rand -base64 48
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET}
    volumes:
      - iaas_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  iaas_data:
