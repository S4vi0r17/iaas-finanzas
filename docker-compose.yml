# Para Dokploy: apunta a este compose (o al Dockerfile de la raíz).
# La base MySQL vive aparte (créala con el "database creator" de Dokploy) y
# se referencia acá vía DATABASE_URL: así el redeploy del API nunca la toca.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Cadena de conexión de la base MySQL creada en Dokploy.
      DATABASE_URL: ${DATABASE_URL:?define DATABASE_URL}
      # ¡Cámbialo en Dokploy! openssl rand -base64 48
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
